name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Resolve Swift Packages
        run: swift package resolve

      # 加入 -skipMacroValidation 來放行 TCA 使用的巨集
      - name: Run Core Logic Tests (iOS)
        run: |
          xcodebuild test \
            -workspace . \
            -scheme CryptoStream-TCA \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.1" \
            -skipMacroValidation

      # 同樣在編譯步驟加上 -skipMacroValidation
      - name: Build iOS App (Xcodeproj)
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.1" \
            -skipMacroValidation \
            -clonedSourcePackagesDirPath $HOME/Library/Developer/Xcode/DerivedData/CryptoApp/SourcePackages
