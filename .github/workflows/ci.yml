name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Resolve Swift Packages
        run: swift package resolve

      # 在 macOS 上跑單元測試（最穩定，不依賴特定 iOS 模擬器版本）
      - name: Run Unit Tests (macOS)
        run: |
          xcodebuild test \
            -workspace . \
            -scheme CryptoStream-TCA \
            -destination "platform=macOS" \
            -skipMacroValidation

      # 驗證 App 殼專案能針對通用的 iOS Simulator 編譯
      - name: Build iOS App
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "generic/platform=iOS Simulator" \
            -skipMacroValidation
