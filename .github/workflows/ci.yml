name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-15
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 強制切換到 Xcode 16.2 確保獲得 Swift 6 編譯環境
      - name: Force Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Resolve Swift Packages
        run: swift package resolve

      # 【關鍵更改】用最純正、最原生的 Swift Test 代替笨重的 Xcodebuild
      - name: Run Unit Tests (macOS)
        run: swift test

      # App 這裡繼續保持使用 iOS 通用模擬器，確保 UIKit 等 iOS 專屬部分能過
      - name: Build iOS App
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "generic/platform=iOS Simulator" \
            -skipMacroValidation
