name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Resolve Swift Packages
        run: swift package resolve

      # 移除 OS=latest，讓系統自動對準已安裝的 iPhone 15 模擬器環境
      - name: Run Core Logic Tests (iOS)
        run: |
          xcodebuild test \
            -workspace . \
            -scheme CryptoStream-TCA \
            -destination "platform=iOS Simulator,name=iPhone 15"

      # 同理，編譯步驟也放寬限制
      - name: Build iOS App (Xcodeproj)
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "platform=iOS Simulator,name=iPhone 15" \
            -clonedSourcePackagesDirPath $HOME/Library/Developer/Xcode/DerivedData/CryptoApp/SourcePackages
