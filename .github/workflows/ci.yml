name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Resolve Swift Packages
        run: swift package resolve

      # 動態抓取系統中第一個可用的 iOS 模擬器，不再被硬碼名稱綁死
      - name: Run Core Logic Tests (iOS)
        run: |
          DEST=$(xcodebuild -workspace . -scheme CryptoStream-TCA -showdestinations | grep -m 1 "platform:iOS Simulator" | sed -E 's/.*platform:([^,]+), id:([^,]+), name:([^,]+).*/platform=\1,id=\2/')
          echo "Selected Destination: $DEST"
          xcodebuild test \
            -workspace . \
            -scheme CryptoStream-TCA \
            -destination "$DEST"

      # 針對相同的動態目標進行 App 編譯驗證
      - name: Build iOS App (Xcodeproj)
        run: |
          DEST=$(xcodebuild -workspace . -scheme CryptoApp -showdestinations | grep -m 1 "platform:iOS Simulator" | sed -E 's/.*platform:([^,]+), id:([^,]+), name:([^,]+).*/platform=\1,id=\2/')
          echo "Selected Destination: $DEST"
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "$DEST" \
            -clonedSourcePackagesDirPath $HOME/Library/Developer/Xcode/DerivedData/CryptoApp/SourcePackages
