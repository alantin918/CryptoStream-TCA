name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2' # 使用最穩定的 16.2

      - name: Resolve Swift Packages
        run: swift package resolve

      # 加入 -parallelizeTargets NO 降低記憶體壓力，防止編譯器崩潰
      - name: Run Core Logic Tests (iOS)
        run: |
          xcodebuild test \
            -workspace . \
            -scheme CryptoStream-TCA \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.1" \
            -skipMacroValidation \
            -parallelizeTargets NO

      - name: Build iOS App (Xcodeproj)
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.1" \
            -skipMacroValidation \
            -parallelizeTargets NO \
            -clonedSourcePackagesDirPath $HOME/Library/Developer/Xcode/DerivedData/CryptoApp/SourcePackages
