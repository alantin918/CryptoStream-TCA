name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-15
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Resolve Swift Packages
        run: swift package resolve

      # 第一步：直接在 macOS 原生環境執行單元測試 (Bug 已被我們修復！)
      - name: Run Unit Tests (macOS)
        run: |
          xcodebuild test \
            -workspace . \
            -scheme CryptoStream-TCA \
            -destination "platform=macOS" \
            -skipMacroValidation

      # 第二步：驗證 iOS App 本體可以正常編譯
      - name: Build iOS App
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "generic/platform=iOS Simulator" \
            -skipMacroValidation
