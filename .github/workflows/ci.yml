name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Resolve Swift Packages
        run: xcrun swift package resolve

      # 使用 xcrun 確保使用 Xcode 16.2 的 Swift 6.0，避免系統舊版 Swift 的語法問題
      - name: Run Unit Tests
        run: xcrun swift test -v

      # 驗證 App 殼專案能針對通用的 iOS Simulator 編譯
      - name: Build iOS App
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "generic/platform=iOS Simulator" \
            -skipMacroValidation

