name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    # 強制使用最新版 macOS 15，原廠預設就會搭載最新版 Swift 編譯器
    runs-on: macos-15
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 拋棄第三方的 Action，直接用 Unix 最底層的指令硬切換 Xcode 16.2
      - name: Force Select Xcode 16.2
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          swift --version

      - name: Resolve Swift Packages
        run: swift package resolve

      # 現在這裡一定是真真正正的 Swift 6.0 編譯器了！不會再報逗號錯誤。
      - name: Run Unit Tests
        run: swift test -v

      # 驗證整體 App 的編譯
      - name: Build iOS App
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "generic/platform=iOS Simulator" \
            -skipMacroValidation
