name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-latest # 回到最新穩定的環境
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 使用日誌中確認存在的 16.2.0 版本
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Resolve Swift Packages
        run: swift package resolve

      # 使用 xcodebuild 針對 iOS 模擬器測試，避開 macOS SDK 的編譯衝突
      - name: Run Core Logic Tests (iOS)
        run: |
          xcodebuild test \
            -scheme CryptoStream-TCA \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest'

      # 最後檢查 App 殼專案是否能編譯
      - name: Build iOS App (Xcodeproj)
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -clonedSourcePackagesDirPath $HOME/Library/Developer/Xcode/DerivedData/CryptoApp/SourcePackages
