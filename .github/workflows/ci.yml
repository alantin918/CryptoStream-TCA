name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Build and Validate
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Resolve Swift Packages
        run: swift package resolve

      # 直接驗證 Package 的程式碼能夠編譯（macOS target）
      - name: Build Swift Package
        run: swift build -c release

      # 驗證 App 殼專案能編譯
      - name: Build iOS App
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.1" \
            -skipMacroValidation
