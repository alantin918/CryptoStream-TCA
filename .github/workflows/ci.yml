name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-15
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 切換到 Xcode 16.2
      - name: Force Select Xcode 16.2
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          swift --version

      # 【致勝關鍵】花一兩分鐘現場下載 iOS 18.2 模擬器，補足 GitHub 缺少的拼圖！
      - name: Download iOS Simulator
        run: |
          xcodebuild -downloadPlatform iOS

      - name: Resolve Swift Packages
        run: swift package resolve

      # 在有 Simulator 的環境下，直接跑最初設定的 iOS 測試
      - name: Run Unit Tests (iOS Simulator)
        run: |
          xcodebuild test \
            -workspace . \
            -scheme CryptoStream-TCA \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -skipMacroValidation

      # 驗證整體 App 的編譯
      - name: Build iOS App
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "generic/platform=iOS Simulator" \
            -skipMacroValidation
