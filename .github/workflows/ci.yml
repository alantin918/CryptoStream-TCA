name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Resolve Swift Packages
        run: swift package resolve

      # 這裡會跑 Tests/CryptoStream-TCATests 底下的邏輯測試
      - name: Run Unit Tests (iOS Simulator)
        run: |
          xcodebuild test \
            -workspace . \
            -scheme CryptoStream-TCA \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.1" \
            -skipMacroValidation

      # 驗證整體 App 的編譯
      - name: Build iOS App
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.1" \
            -skipMacroValidation
