name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-15
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Select Xcode 16.2
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          swift --version

      - name: Resolve Swift Packages
        run: swift package resolve

      # 【致勝關鍵】使用 iOS 模擬器執行單元測試，徹底避開 macOS 平台的語法解析 Bug！
      - name: Run Unit Tests (iOS Simulator)
        run: |
          xcodebuild test \
            -workspace . \
            -scheme CryptoStream-TCA \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -skipMacroValidation

      # 驗證整體 App 的編譯 (沒有變動)
      - name: Build iOS App
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "generic/platform=iOS Simulator" \
            -skipMacroValidation
