name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    runs-on: macos-14 # 鎖定 macOS 14 環境，這與 Xcode 16.1 搭配最穩定
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 使用 16.1 並鎖定 iOS 18.1 環境，這是目前雲端最穩健的組合
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Resolve Swift Packages
        run: swift package resolve

      # 使用明確存在的 iPhone 16 (iOS 18.1) 模擬器跑測試
      - name: Run Core Logic Tests (iOS)
        run: |
          xcodebuild test \
            -workspace . \
            -scheme CryptoStream-TCA \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.1"

      - name: Build iOS App (Xcodeproj)
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.1" \
            -clonedSourcePackagesDirPath $HOME/Library/Developer/Xcode/DerivedData/CryptoApp/SourcePackages
