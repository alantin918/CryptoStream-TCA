name: CryptoStream CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test and Build
    # 關鍵修正 1：換成最新的 macOS 15，預設配備最新 Swift 系統
    runs-on: macos-15
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 關鍵修正 2：用最底層的終端指令完全強制切換到 Xcode 16.2
      - name: Force Select Xcode 16.2
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          swift --version

      - name: Resolve Swift Packages
        run: swift package resolve

      # 在 macOS 上跑單元測試（最穩定，不依賴特定 iOS 模擬器版本）
      - name: Run Unit Tests (macOS)
        run: |
          xcodebuild test \
            -workspace . \
            -scheme CryptoStream-TCA \
            -destination "platform=macOS" \
            -skipMacroValidation

      # 驗證 App 殼專案能針對通用的 iOS Simulator 編譯
      - name: Build iOS App
        run: |
          xcodebuild build \
            -project CryptoApp.xcodeproj \
            -scheme CryptoApp \
            -destination "generic/platform=iOS Simulator" \
            -skipMacroValidation
